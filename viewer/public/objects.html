<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Объекты · KPI Viewer</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div>
        <nav class="hero-nav">
          <a class="nav-link" href="/">KPI</a>
          <a class="nav-link" href="/staff.html">Сотрудники</a>
          <a class="nav-link is-active" href="/objects.html">Объекты</a>
          <a class="nav-link" href="/upload.html">Загрузка</a>
          <a class="nav-link" href="/metrics.html">Показатели</a>
          <a class="nav-link" href="/position-kpi.html">По должностям</a>
        </nav>
        <h1>Справочник объектов</h1>
      </div>
      <div class="hero-panel">
        <div class="control-label">Добавление</div>
        <button id="open-object-create" class="primary-button hero-panel-action" type="button">Добавить объект</button>
        <div id="objects-status" class="server-status">Загрузка справочника...</div>
        <label class="toggle-line">
          <input id="show-archived-objects" type="checkbox">
          <span>Показывать архив</span>
        </label>
      </div>
    </header>

    <main class="stack-layout">
      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">Список</p>
            <h2>Таблица объектов</h2>
          </div>
          <div class="toolbar">
            <input id="objects-search-input" class="control" type="search" placeholder="Поиск по объекту или руководителю">
          </div>
        </div>

        <div class="table-wrap">
          <table class="employees-table staff-table">
            <thead>
              <tr>
                <th>Объект</th>
                <th>Руководитель</th>
                <th>Статус</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="objects-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <dialog id="object-create-dialog" class="modal-dialog">
    <div class="modal-card">
      <form id="object-create-form" class="employee-form modal-form">
        <div class="modal-head">
          <div>
            <p class="panel-kicker">Новый объект</p>
            <h2>Добавить запись</h2>
          </div>
          <button id="close-object-create" class="modal-close" type="button" aria-label="Закрыть окно">×</button>
        </div>

        <div class="form-grid kpi-create-form-grid">
          <label class="form-field">
            <span class="form-label">Название объекта</span>
            <input id="object-create-name" class="control" type="text" placeholder="Введите название объекта" required>
          </label>
          <label class="form-field">
            <span class="form-label">Руководитель</span>
            <select id="object-create-manager" class="control control-select"></select>
          </label>
        </div>
        <div class="form-actions">
          <button class="primary-button" type="submit">Добавить объект</button>
          <button id="cancel-object-create" class="action-button secondary" type="button">Отмена</button>
          <div id="object-create-status" class="form-status"></div>
        </div>
      </form>
    </div>
  </dialog>

  <script src="/auth-client.js"></script>
  <script src="/objects.js"></script>
</body>
</html>
