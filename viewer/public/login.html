<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в CRM KPI</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-brand">
        <p class="eyebrow">CRM KPI</p>
        <h1>Система управления KPI сотрудников</h1>
        <p class="hero-copy">
          Войдите в систему, чтобы открыть рабочий интерфейс CRM, таблицы сотрудников и карточки показателей.
        </p>
      </div>

      <div class="auth-form-card">
        <form id="login-form" class="employee-form" autocomplete="on">
          <div>
            <p class="panel-kicker">Авторизация</p>
            <h2>Вход в систему</h2>
          </div>

          <div class="form-grid form-grid-single">
            <label class="form-field">
              <span class="form-label">Логин</span>
              <input
                id="login-input"
                class="control"
                type="text"
                name="username"
                autocomplete="username"
                placeholder="Введите логин"
                required
              >
            </label>

            <label class="form-field">
              <span class="form-label">Пароль</span>
              <input
                id="password-input"
                class="control"
                type="password"
                name="current-password"
                autocomplete="current-password"
                placeholder="Введите пароль"
                required
              >
            </label>
          </div>

          <div class="form-actions auth-form-actions">
            <button id="login-submit" class="primary-button" type="submit">Войти</button>
            <div id="login-status" class="form-status"></div>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script src="/login.js"></script>
</body>
</html>
