<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пользователи · KPI Viewer</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div>
        <nav class="hero-nav">
          <a class="nav-link" href="/">KPI</a>
          <a class="nav-link" href="/staff.html">Сотрудники</a>
          <a class="nav-link" href="/objects.html">Объекты</a>
          <a class="nav-link" href="/upload.html">Загрузка</a>
          <a class="nav-link" href="/metrics.html">Показатели</a>
          <a class="nav-link" href="/position-kpi.html">По должностям</a>
          <a class="nav-link is-active" href="/users.html">Пользователи</a>
          <a class="nav-link" href="/logs.html">Логи</a>
        </nav>
        <h1>Пользователи системы</h1>
      </div>
      <div class="hero-panel">
        <div class="control-label">Администрирование</div>
        <button id="open-user-create" class="primary-button hero-panel-action" type="button">Добавить пользователя</button>
        <div id="users-status" class="server-status">Загрузка пользователей...</div>
      </div>
    </header>

    <main class="stack-layout">
      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">Доступ</p>
            <h2>Роли, статус и последний вход</h2>
          </div>
          <div class="toolbar">
            <input id="users-search-input" class="control" type="search" placeholder="Поиск по логину или ФИО">
          </div>
        </div>

        <div class="table-wrap">
          <table class="employees-table staff-table">
            <thead>
              <tr>
                <th>Логин</th>
                <th>Пользователь</th>
                <th>Роль</th>
                <th>Статус</th>
                <th>Пароль</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="users-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <dialog id="user-create-dialog" class="modal-dialog">
    <div class="modal-card">
      <form id="user-create-form" class="employee-form modal-form">
        <div class="modal-head">
          <div>
            <p class="panel-kicker">Новый пользователь</p>
            <h2>Добавить учетную запись</h2>
          </div>
          <button id="close-user-create" class="modal-close" type="button" aria-label="Закрыть окно">Г—</button>
        </div>

        <div class="form-grid">
          <label class="form-field">
            <span class="form-label">Логин</span>
            <input id="user-create-login" class="control" type="text" autocomplete="username" required>
          </label>
          <label class="form-field">
            <span class="form-label">Пароль</span>
            <input id="user-create-password" class="control" type="password" autocomplete="new-password" required>
          </label>
          <label class="form-field">
            <span class="form-label">Имя пользователя</span>
            <input id="user-create-display-name" class="control" type="text" required>
          </label>
          <label class="form-field">
            <span class="form-label">Краткое ФИО</span>
            <input id="user-create-short-name" class="control" type="text" placeholder="Например, Дюг К.Н." required>
          </label>
          <label class="form-field">
            <span class="form-label">Роль</span>
            <select id="user-create-role" class="control control-select" required></select>
          </label>
          <label class="toggle-line">
            <input id="user-create-active" type="checkbox" checked>
            <span>Пользователь активен</span>
          </label>
        </div>

        <div class="form-actions">
          <button class="primary-button" type="submit">Создать пользователя</button>
          <button id="cancel-user-create" class="action-button secondary" type="button">Отмена</button>
          <div id="user-create-status" class="form-status"></div>
        </div>
      </form>
    </div>
  </dialog>

  <script src="/auth-client.js"></script>
  <script src="/users.js"></script>
</body>
</html>
